[loggers]
keys=root,quanta

[handlers]
keys=consoleHandler,fileHandler

[formatters]
keys=detailed

[logger_root]
level=WARNING
handlers=consoleHandler

[logger_quanta]
level=INFO
handlers=consoleHandler,fileHandler
qualname=quanta_fusion
propagate=0

[handler_consoleHandler]
class=StreamHandler
level=INFO
formatter=detailed
args=(sys.stdout,)

[handler_fileHandler]
class=FileHandler
level=INFO
formatter=detailed
args=('quanta_fusion.log', 'a')

[formatter_detailed]
format=%(asctime)s | %(name)s | %(levelname)s | %(message)s
datefmt=%Y-%m-%d %H:%M:%S
