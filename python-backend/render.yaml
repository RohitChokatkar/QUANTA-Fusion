# QuantFusion v2.0 — Render Deployment Blueprint
# Deploys the FastAPI Python backend as a web service

services:
  - type: web
    name: quantfusion-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn main:app -w 2 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT --timeout 120
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: FYERS_CLIENT_ID
        sync: false
      - key: FYERS_SECRET_KEY
        sync: false
      - key: FYERS_REDIRECT_URI
        sync: false
      - key: FYERS_ACCESS_TOKEN
        sync: false
      - key: FYERS_PIN
        sync: false
      - key: FYERS_TOTP_SECRET
        sync: false
      - key: TWELVE_DATA_API_KEY
        sync: false
      - key: ALPHA_VANTAGE_API_KEY
        sync: false
      - key: NEWS_API_KEY
        sync: false
      - key: ADMIN_SECRET
        sync: false
      - key: DEBUG
        value: "false"
